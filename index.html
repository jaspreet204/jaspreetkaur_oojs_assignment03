<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jaspreet Kaur">
    <meta name="description" content="fakebook, social media, javascript, oop, es modules">
    <title>Fakebook</title>
    <link rel="stylesheet" href="./assets/style/style.css" media="all">
    <script src="./assets/script/script.js" type="module" defer></script>
</head>
<body>
    <div class="page">
        <header class="top-bar">
         <div class="header-left">
            <h1>Fakebook</h1>
            <p>Post your ideas and moments</p>
         </div>
           <div class="header-right">
             <img src="./assets/media/jaspreet-image.jpeg" class="header-pic" alt="Profile">
            <button id="accountBtn">My Account</button>
           </div>
         </header>
        <section class="post-box">
            <form id="postForm">
                <label for="postText">Post:</label>
                <textarea id="postText" placeholder="Share something or upload a photo..." rows="4"></textarea>
                <label for="postImage">Choose image:</label>
                <input type="file" id="postImage" accept="image/*">
                <button type="submit" id="postBtn" disabled>Post</button>
            </form>
        </section>
        <section class="posts-area">
            <h2>Posts</h2>
            <div id="postsSection"></div>
        </section>
    </div>
    <div id="modal" class="modal hidden">
        <div class="modal-box">
            <button id="closeModal" class="close-btn">&times;</button>
            <h2>Account Information</h2>
            <div id="modalContent"></div>
        </div>
    </div>
</body>
</html>
